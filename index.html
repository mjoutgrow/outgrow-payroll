<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outgrow Payroll System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<div class="header">💼 Outgrow Payroll System 📊</div>

<div class="container">

<div class="card">
<button class="btn-primary" onclick="openAddModal()">➕ Add Record</button>
<button class="btn-secondary" onclick="openEmployeeModal()">👥 Employees</button>
<button class="btn-secondary" onclick="exportCSV()">📤 Export Weekly</button>
<button class="btn-secondary" onclick="exportMonthlyCSV()">📅 Export Monthly</button>
<button class="btn-danger" onclick="openClearModal()">🗑️ Clear All</button>
</div>

<div class="search-box">
  <input id="searchInput" placeholder="🔍 Search employee..." onkeyup="toggleClearBtn(); render()">
  <span id="clearBtn" onclick="clearSearch()">✖</span>
</div>

<div class="card">
<h3>📋 Records</h3>
<table>
<tr>
<th>Name</th><th>Date</th><th>Hours</th><th>Break</th><th>MIA</th><th>Late</th><th>Salary</th><th>$</th><th>Action</th>
</tr>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="card">
<h3>📊 Weekly Summary</h3>
<table>
<tr>
<th>Employee</th><th>Cutoff</th><th>Hours</th><th>Break</th><th>MIA</th><th>Late</th><th>Salary</th><th>$</th><th>Action</th>
</tr>
<tbody id="summaryBody"></tbody>
</table>
</div>

<div class="card">
<h3>📆 Monthly Report</h3>
<table>
<tr>
<th>Employee</th><th>Month</th><th>Hours</th><th>Break</th><th>MIA</th><th>Late</th><th>Salary</th><th>$</th>
</tr>
<tbody id="monthlyBody"></tbody>
</table>
</div>
</div>

<div class="modal" id="employeeModal"><div class="modal-box">
<h3>Employees</h3>
<input id="empName" placeholder="Name">
<input id="empRate" type="number" placeholder="₱ Rate/hr">
<input id="empDollarRate" type="number" placeholder="$ Rate/hr">
<button onclick="addEmployee()">Add</button>
<div id="empList"></div>
<button onclick="closeEmployeeModal()">Close</button>
</div></div>

<div class="modal" id="addModal">
<div class="modal-box" style="max-width:900px;">

<h3>➕ Add Multiple Records</h3>

<label><strong>Employee</strong></label>
<select id="employeeSelect"></select>

<hr style="margin:15px 0;">

<div id="recordContainer"></div>

<button type="button" class="btn-secondary" onclick="addRecordRow()">
➕ Add Another Date
</button>

<hr style="margin:15px 0;">

<button class="btn-primary" onclick="addMultipleRecords()">
💾 Save All Records
</button>

<button class="btn-danger" onclick="closeAddModal()">
Cancel
</button>

</div>
</div>

<div class="modal" id="editModal"><div class="modal-box">

<h3>✏️ Edit Record</h3>
<label><strong>Employee:</strong></label>
<input type="text" id="editName" disabled>
<label><strong>Date:</strong></label>
<input type="date" id="editDate" disabled>
<label><strong>Time In:</strong></label>
<input type="text" id="editTimeIn" placeholder="Time In"
onblur="autoFormatTime(this)" onpaste="handlePaste(event,this)">

<input type="text" id="editTimeOut" placeholder="Time Out"
onblur="autoFormatTime(this)" onpaste="handlePaste(event,this)">
<input type="number" id="editBreak" step="1" min="0" placeholder="Break (minutes)">
<input type="number" id="editMia" step="1" min="0" placeholder="MIA (minutes)">
<input type="number" id="editLate" step="1" min="0" placeholder="Late (minutes)">
<button onclick="saveEdit()">Save</button>
<button onclick="closeEditModal()">Cancel</button>
</div></div>

<div class="modal" id="payslipModal">
<div class="modal-box payslip-box">
<div id="payslipContent"></div>
</div>
</div>

<div class="modal" id="clearModal"><div class="modal-box">
<h3>⚠️ Clear All Data?</h3>
<button onclick="confirmClear()">Yes</button>
<button onclick="closeClearModal()">Cancel</button>
</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="script.js"></script>
</body>
</html>
